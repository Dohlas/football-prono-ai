<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer dashed boundary of the soccer ball network -->
  <circle cx="50" cy="50" r="45" stroke="#10B981" stroke-width="3" stroke-dasharray="2 3"/>
  
  <!-- Central pentagon structure -->
  <polygon points="50,30 69,44 62,67 38,67 31,44" stroke="#0EA5E9" stroke-width="4" fill="none"/>
  
  <!-- Outward database / prediction network link lines -->
  <line x1="50" y1="30" x2="50" y2="10" stroke="#10B981" stroke-width="4"/>
  <line x1="69" y1="44" x2="88" y2="38" stroke="#10B981" stroke-width="4"/>
  <line x1="62" y1="67" x2="77" y2="85" stroke="#10B981" stroke-width="4"/>
  <line x1="38" y1="67" x2="23" y2="85" stroke="#10B981" stroke-width="4"/>
  <line x1="31" y1="44" x2="12" y2="38" stroke="#10B981" stroke-width="4"/>
  
  <!-- Outer shell hexagon network -->
  <polygon points="50,10 73,18 88,38 77,59 77,85 50,90 23,85 23,59 12,38 27,18" stroke="#0EA5E9" stroke-width="3" fill="none"/>
  
  <!-- Glowing data nodes (glowing white vertices) at all intersections -->
  <circle cx="50" cy="30" r="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <circle cx="69" cy="44" r="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <circle cx="62" cy="67" r="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <circle cx="38" cy="67" r="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <circle cx="31" cy="44" r="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  
  <circle cx="50" cy="10" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <circle cx="88" cy="38" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <circle cx="77" cy="85" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <circle cx="23" cy="85" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
  <circle cx="12" cy="38" r="4" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/>
</svg>